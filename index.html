<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Converter Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      padding: 40px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      color: #333;
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #666;
      font-size: 0.95em;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.2em;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
    }

    .upload-area {
      border: 2px dashed #667eea;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f0f3ff;
    }

    .upload-area.active {
      border-color: #764ba2;
      background: #f0f3ff;
    }

    .upload-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #333;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .upload-hint {
      color: #999;
      font-size: 0.9em;
    }

    #fileInput {
      display: none;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 600;
      color: #333;
      font-size: 0.95em;
    }

    select, input[type="number"] {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95em;
      transition: border-color 0.3s ease;
      font-family: inherit;
    }

    select:focus, input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .quality-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .quality-value {
      min-width: 50px;
      text-align: center;
      font-weight: 600;
      color: #667eea;
    }

    .preview-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .preview-container {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
      background: #fafafa;
      display: none;
    }

    .preview-container.active {
      display: block;
    }

    .preview-label {
      font-weight: 600;
      color: #666;
      margin-bottom: 10px;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .preview-image {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      border-radius: 8px;
      background: white;
    }

    .image-info {
      margin-top: 10px;
      font-size: 0.85em;
      color: #666;
      display: grid;
      gap: 5px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
      min-width: 150px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      flex: 1;
      min-width: 150px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 0.85em;
      flex: none;
    }

    .file-list {
      background: #fafafa;
      border-radius: 8px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.9em;
      border-left: 3px solid #667eea;
    }

    .file-item:last-child {
      margin-bottom: 0;
    }

    .file-name {
      color: #333;
      font-weight: 500;
    }

    .file-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
      font-size: 0.85em;
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.8em;
    }

    .status-badge.processing {
      background: #fff3cd;
      color: #856404;
    }

    .status-badge.done {
      background: #d4edda;
      color: #155724;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .stats {
      background: #f8f9ff;
      padding: 20px;
      border-radius: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
      display: none;
    }

    .stats.show {
      display: grid;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      color: #999;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .stat-value {
      color: #667eea;
      font-size: 1.5em;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.8em;
      }

      .controls-grid {
        grid-template-columns: 1fr;
      }

      .preview-section {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .btn-primary, .btn-secondary {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖼️ Image Converter Pro</h1>
      <p class="subtitle">Convert, resize & optimize images in your browser</p>
    </header>

    <div id="alertBox" class="alert"></div>

    <!-- Upload Section -->
    <div class="section">
      <div class="section-title">Upload Images</div>
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Click to select or drag & drop images</div>
        <div class="upload-hint">Supports: JPG, PNG, WebP, GIF, BMP (up to 50MB)</div>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*">
    </div>

    <!-- Controls Section -->
    <div class="section" id="controlsSection" style="display: none;">
      <div class="section-title">Conversion Settings</div>
      <div class="controls-grid">
        <div class="control-group">
          <label for="formatSelect">Output Format</label>
          <select id="formatSelect">
            <option value="image/png">PNG (Lossless)</option>
            <option value="image/jpeg">JPEG (Smaller)</option>
            <option value="image/webp">WebP (Modern)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="qualitySlider">Quality</label>
          <div class="quality-container">
            <input type="range" id="qualitySlider" min="10" max="100" value="80">
            <span class="quality-value" id="qualityValue">80%</span>
          </div>
        </div>

        <div class="control-group">
          <label for="widthInput">Width (px)</label>
          <input type="number" id="widthInput" min="1" max="4000" value="0" placeholder="0 = original">
        </div>

        <div class="control-group">
          <label for="heightInput">Height (px)</label>
          <input type="number" id="heightInput" min="1" max="4000" value="0" placeholder="0 = auto">
        </div>
      </div>

      <div class="control-group" style="margin-bottom: 20px;">
        <label>
          <input type="checkbox" id="maintainAspect" checked>
          Maintain aspect ratio when resizing
        </label>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="stats" id="statsSection">
      <div class="stat-item">
        <div class="stat-label">Files Uploaded</div>
        <div class="stat-value" id="statUpload">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Files Processed</div>
        <div class="stat-value" id="statProcessed">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Space Saved</div>
        <div class="stat-value" id="statSaved">0%</div>
      </div>
    </div>

    <!-- Preview Section -->
    <div class="section" id="previewSection" style="display: none;">
      <div class="section-title">Preview</div>
      <div class="preview-section">
        <div class="preview-container" id="originalPreview">
          <div class="preview-label">Original</div>
          <img class="preview-image" id="originalImg" alt="Original">
          <div class="image-info" id="originalInfo"></div>
        </div>
        <div class="preview-container" id="convertedPreview">
          <div class="preview-label">Converted</div>
          <img class="preview-image" id="convertedImg" alt="Converted">
          <div class="image-info" id="convertedInfo"></div>
        </div>
      </div>
    </div>

    <!-- File List Section -->
    <div class="section" id="fileListSection" style="display: none;">
      <div class="section-title">Queue</div>
      <div class="file-list" id="fileList"></div>
    </div>

    <!-- Buttons Section -->
    <div class="section" id="buttonsSection" style="display: none;">
      <div class="button-group">
        <button class="btn-primary" id="convertBtn">⚡ Convert All</button>
        <button class="btn-secondary btn-small" id="clearBtn">Clear</button>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const formatSelect = document.getElementById('formatSelect');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityValue = document.getElementById('qualityValue');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const maintainAspect = document.getElementById('maintainAspect');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const alertBox = document.getElementById('alertBox');
    const controlsSection = document.getElementById('controlsSection');
    const previewSection = document.getElementById('previewSection');
    const fileListSection = document.getElementById('fileListSection');
    const buttonsSection = document.getElementById('buttonsSection');
    const fileList = document.getElementById('fileList');
    const statsSection = document.getElementById('statsSection');

    let uploadedFiles = [];
    let originalImage = null;

    // Upload area events
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('active');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('active'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('active');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
      if (files.length === 0) return;

      for (let file of files) {
        if (!file.type.startsWith('image/')) {
          showAlert('Only image files are supported', 'error');
          continue;
        }

        if (file.size > 50 * 1024 * 1024) {
          showAlert(`File ${file.name} is too large (max 50MB)`, 'error');
          continue;
        }

        uploadedFiles.push({
          file: file,
          status: 'pending',
          originalSize: file.size,
          convertedSize: null,
          originalImage: null,
          convertedImage: null
        });
      }

      updateUI();
      loadFirstImage();
    }

    function loadFirstImage() {
      if (uploadedFiles.length === 0) return;

      const firstFile = uploadedFiles[0].file;
      const reader = new FileReader();

      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          uploadedFiles[0].originalImage = img;
          updatePreview();
        };
        img.src = e.target.result;
      };

      reader.readAsDataURL(firstFile);
    }

    function updateUI() {
      const hasFiles = uploadedFiles.length > 0;
      controlsSection.style.display = hasFiles ? 'block' : 'none';
      previewSection.style.display = hasFiles ? 'block' : 'none';
      fileListSection.style.display = hasFiles ? 'block' : 'none';
      buttonsSection.style.display = hasFiles ? 'block' : 'none';
      statsSection.classList.toggle('show', hasFiles);

      document.getElementById('statUpload').textContent = uploadedFiles.length;

      updateFileList();
    }

    function updateFileList() {
      fileList.innerHTML = '';
      uploadedFiles.forEach((fileData, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="file-name">${fileData.file.name}</span>
          <div class="file-status">
            ${fileData.status === 'processing' ? '<div class="spinner"></div>' : ''}
            <span class="status-badge ${fileData.status === 'done' ? 'done' : 'processing'}">
              ${fileData.status === 'done' ? '✓ Done' : 'Pending'}
            </span>
          </div>
        `;
        fileList.appendChild(item);
      });
    }

    function updatePreview() {
      if (!originalImage) return;

      const originalPreview = document.getElementById('originalPreview');
      const originalImg = document.getElementById('originalImg');
      const originalInfo = document.getElementById('originalInfo');

      originalImg.src = originalImage.src;
      originalPreview.classList.add('active');

      originalInfo.innerHTML = `
        <div class="info-row">
          <span>Dimensions:</span>
          <span>${originalImage.naturalWidth} × ${originalImage.naturalHeight}px</span>
        </div>
        <div class="info-row">
          <span>Format:</span>
          <span>${uploadedFiles[0].file.type || 'Unknown'}</span>
        </div>
        <div class="info-row">
          <span>Size:</span>
          <span>${formatFileSize(uploadedFiles[0].file.size)}</span>
        </div>
      `;
    }

    qualitySlider.addEventListener('input', (e) => {
      qualityValue.textContent = e.target.value + '%';
    });

    widthInput.addEventListener('change', updatePreview);
    heightInput.addEventListener('change', updatePreview);
    maintainAspect.addEventListener('change', updatePreview);

    convertBtn.addEventListener('click', convertAllImages);
    clearBtn.addEventListener('click', clearAll);

    async function convertAllImages() {
      if (uploadedFiles.length === 0) return;

      convertBtn.disabled = true;
      convertBtn.textContent = '⏳ Converting...';

      for (let i = 0; i < uploadedFiles.length; i++) {
        uploadedFiles[i].status = 'processing';
        updateFileList();

        await convertImage(uploadedFiles[i]);

        uploadedFiles[i].status = 'done';
        updateFileList();
      }

      updateStats();
      convertBtn.disabled = false;
      convertBtn.textContent = '⚡ Convert All';
      showAlert('✓ All images converted successfully!', 'success');
    }

    function convertImage(fileData) {
      return new Promise((resolve) => {
        const reader = new FileReader();

        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = parseInt(widthInput.value) || img.naturalWidth;
            let height = parseInt(heightInput.value) || img.naturalHeight;

            if (maintainAspect.checked && widthInput.value && !heightInput.value) {
              height = (width / img.naturalWidth) * img.naturalHeight;
            } else if (maintainAspect.checked && heightInput.value && !widthInput.value) {
              width = (height / img.naturalHeight) * img.naturalWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob((blob) => {
              const format = formatSelect.value;
              const quality = formatSelect.value === 'image/png' ? 1 : parseInt(qualitySlider.value) / 100;

              fileData.convertedSize = blob.size;
              fileData.convertedImage = canvas.toDataURL(format, quality);

              // Auto-download
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              const extension = format === 'image/png' ? '.png' : format === 'image/jpeg' ? '.jpg' : '.webp';
              a.download = fileData.file.name.split('.')[0] + extension;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);

              resolve();
            }, format, quality);
          };
          img.src = e.target.result;
        };

        reader.readAsDataURL(fileData.file);
      });
    }

    function updateStats() {
      const processed = uploadedFiles.filter(f => f.status === 'done').length;
      const originalTotal = uploadedFiles.reduce((sum, f) => sum + f.originalSize, 0);
      const convertedTotal = uploadedFiles.reduce((sum, f) => sum + (f.convertedSize || 0), 0);
      const saved = ((originalTotal - convertedTotal) / originalTotal * 100).toFixed(1);

      document.getElementById('statProcessed').textContent = processed;
      document.getElementById('statSaved').textContent = saved + '%';
    }

    function clearAll() {
      uploadedFiles = [];
      originalImage = null;
      fileInput.value = '';
      document.getElementById('originalPreview').classList.remove('active');
      document.getElementById('convertedPreview').classList.remove('active');
      updateUI();
    }

    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert show alert-${type}`;
      setTimeout(() => alertBox.classList.remove('show'), 3000);
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }
  </script>
</body>
</html>
